# 经典/传统款clash规则示例
# 
# 不需要联网更新规则集，适合不想使用在线规则集的用户。
# 注意：GEOIP，需要GeoLite2-Country.mmdb数据库文件: https://github.com/P3TERX/GeoLite.mmdb

# ===== 域名规则 - 精确控制 =====
rules:
  # 中国大陆网站直连
  - DOMAIN-SUFFIX,baidu.com,DIRECT
  - DOMAIN-SUFFIX,qq.com,DIRECT
  - DOMAIN-SUFFIX,taobao.com,DIRECT
  - DOMAIN-SUFFIX,tmall.com,DIRECT
  - DOMAIN-SUFFIX,weibo.com,DIRECT
  - DOMAIN-SUFFIX,jd.com,DIRECT
  - DOMAIN-SUFFIX,163.com,DIRECT
  - DOMAIN-SUFFIX,sina.com,DIRECT
  - DOMAIN-SUFFIX,sohu.com,DIRECT
  - DOMAIN-SUFFIX,360.cn,DIRECT
  - DOMAIN-SUFFIX,aliyun.com,DIRECT
  - DOMAIN-SUFFIX,tencent.com,DIRECT

  # 本地和私有网络直连
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT

  # ===== 代理规则 - 这些网站走代理 =====

  # Google服务（需要代理）
  - DOMAIN-SUFFIX,google.com,PROXY
  - DOMAIN-SUFFIX,googleapis.com,PROXY
  - DOMAIN-SUFFIX,googleusercontent.com,PROXY
  - DOMAIN-SUFFIX,gstatic.com,PROXY
  - DOMAIN-SUFFIX,youtube.com,PROXY
  - DOMAIN-SUFFIX,ytimg.com,PROXY
  - DOMAIN-SUFFIX,ggpht.com,PROXY

  # Facebook/Instagram（需要代理）
  - DOMAIN-SUFFIX,facebook.com,PROXY
  - DOMAIN-SUFFIX,instagram.com,PROXY
  - DOMAIN-SUFFIX,messenger.com,PROXY

  # Twitter/X（需要代理）
  - DOMAIN-SUFFIX,twitter.com,PROXY
  - DOMAIN-SUFFIX,twimg.com,PROXY
  - DOMAIN-SUFFIX,x.com,PROXY

  # 其他被墙或需要加速的服务
  - DOMAIN-SUFFIX,telegram.org,PROXY
  - DOMAIN-SUFFIX,discord.com,PROXY
  - DOMAIN-SUFFIX,github.com,PROXY
  - DOMAIN-SUFFIX,openai.com,PROXY
  - DOMAIN-SUFFIX,chatgpt.com,PROXY
  - DOMAIN-SUFFIX,grok.com,PROXY
  - DOMAIN-SUFFIX,anthropic.com,PROXY
  - DOMAIN-SUFFIX,claude.ai,PROXY
  - DOMAIN-SUFFIX,github.com,PROXY

  # Netflix等流媒体（如果需要）
  - DOMAIN-SUFFIX,netflix.com,PROXY
  - DOMAIN-SUFFIX,nflxvideo.net,PROXY
  
  - DOMAIN-SUFFIX,bing.com,PROXY
  - DOMAIN-SUFFIX,microsoft.com,PROXY

  # ===== 拒绝规则 - 广告和跟踪 =====

  - DOMAIN-SUFFIX,googleads.com,REJECT
  - DOMAIN-SUFFIX,google-analytics.com,REJECT
  - DOMAIN-SUFFIX,doubleclick.net,REJECT
  - DOMAIN-SUFFIX,googlesyndication.com,REJECT
  - DOMAIN-SUFFIX,googletagmanager.com,REJECT

  # ===== GEOIP规则 - 基于地理位置 =====

  # 美国IP代理（如果需要）
  # - GEOIP,US,PROXY

  # 日本IP代理（如果需要）
  # - GEOIP,JP,PROXY

  # 中国IP直连
  - GEOIP,CN,DIRECT

  # ===== 默认规则 =====

  # 兜底规则：所有未匹配的流量都走代理
  - MATCH,PROXY
